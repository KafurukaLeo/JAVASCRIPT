<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC VIDEO FINDER</title>
    <style>
        
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 600px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #video-container {
      margin-top: 20px;
      display: none;
    }

    iframe {
      width: 100%;
      height: 315px;
      border: none;
    }
  </style>
    </style>
</head>
<body>
    <div class="container">
        <h1>MUSIC VIDEO FINDER</h1>
        
            <input type="text" id="artist" placeholder="Artist Name"  required /><br><br>
            <input type="text" id="title"  placeholder="Song-title"  required /><br><br>
            <button onclick="searchVideo()">Find & Play Video</button>

        <div id="video-container">
            <h3>Video Result:</h3>
            <iframe id="youtube-player" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        async function   searchVideo(){
            const artist = document.getElementById('artist').value.trim();
            const title = document.getElementById('title').value.trim();

            if(!artist || !title){
                alert("Please enter both artist and  song title.");
                return;
            }

            const query = encodeURIComponent(`${artist} ${title} official music video`);
            const searchURL = `https://www.youtube.com/results?search_query=${query}`;

            //Use a proxy-free approach: search on YouTube and extract video ID using a CORS proxy
            try{
                const res = await fetch (`https://corsproxy.io/?${encodeURIComponent(searchURL)}`);
                const text = await res.text();

                // Try ti find the first Video ID
                const videoIdMatch = text.match(/"videoId":"(.*?)"/);
                if(videoIdMatch && videoIdMatch[1]){
                    const videoId = videoIdMatch[1];

                    const embedURL = `https://www.youtube.com/embed/${videoId}`;

                    const iframe = document.getElementById('youtube-player');
                    iframe.src=embedURL;
                    document.getElementById('video-container').style.display = 'block';
                }else{
                    alert("Video not found, Try another different song");
                }
            } catch(error){
                console.error("Error fetching youtube page:");
                alert("Failed to fetch video. Try again later.");

            }
        }       
        
    </script>
</body>
</html>
